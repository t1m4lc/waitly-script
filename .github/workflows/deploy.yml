name: Build and Deploy to CDN

on:
  push:
    branches:
      - main  # Adjust to your branch if needed, e.g., main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '20'  # Change Node.js version as per your project requirements

    - name: Install pnpm
      run: npm install -g pnpm  # Install pnpm globally

    - name: Install dependencies
      run: pnpm install  # Install dependencies using pnpm

    - name: Build the project
      run: pnpm run build  # Build the project (generates dist/ folder)

    - name: Deploy to GitHub Pages (latest commit)
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add -f dist/*  # Force add ignored files
        git commit -m "Deploy latest build to GitHub Pages"
        git push origin HEAD:gh-pages  # Push the commit to gh-pages branch
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}